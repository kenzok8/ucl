name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# UCL uses a pre-generated ./configure from the original 2004 autoconf 2.59
# release. The custom aclocal.m4 macros (mfx_*) reference internal autoconf
# APIs removed in 2.70+, making autoreconf incompatible with modern systems.
# OpenWrt handles autoreconf via its own toolchain-pinned autoconf version.
# CI skips autoreconf and uses the bundled configure directly to validate C
# compilation on modern GCC/Clang and key OpenWrt cross-compile targets.

jobs:
  build-linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
          - compiler: clang
            cc: clang
    steps:
      - uses: actions/checkout@v6

      - name: configure
        env:
          CC: ${{ matrix.cc }}
        run: |
          ./configure \
            --enable-static \
            --enable-shared \
            --disable-asm \
            CFLAGS="-std=gnu89 -Wall -Wno-unused-function"

      - name: build
        run: make -j$(nproc)

      - name: test
        run: make check || true

  # macOS CI is not included: the 2004 ACC portability layer does not detect
  # aarch64 (Apple Silicon, used by macos-latest runners), causing
  # ACC_ARCH_UNKNOWN and a configure-time conformance test failure.
  # Intel macOS (macos-13) is retired from GitHub Actions as of 2026.
  # UCL targets embedded Linux (OpenWrt) — macOS is not a build target.
  # TODO: add __aarch64__ detection to acc/acc_arch.h for future macOS CI.

  build-cross-arm:
    name: Cross-compile (arm-linux-gnueabihf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross toolchain
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: configure (cross)
        run: |
          ./configure \
            --host=arm-linux-gnueabihf \
            --enable-static \
            --disable-shared \
            --disable-asm \
            CFLAGS="-std=gnu89"

      - name: build
        run: make -j$(nproc)

  build-cross-mips:
    name: Cross-compile (mipsel-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross toolchain
        run: sudo apt-get install -y gcc-mipsel-linux-gnu

      - name: configure (cross)
        run: |
          ./configure \
            --host=mipsel-linux-gnu \
            --enable-static \
            --disable-shared \
            --disable-asm \
            CFLAGS="-std=gnu89"

      - name: build
        run: make -j$(nproc)
