name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# UCL uses a pre-generated ./configure from the original 2004 autoconf 2.59
# release. The custom aclocal.m4 macros (mfx_*) reference internal autoconf
# APIs removed in 2.70+, making autoreconf incompatible with modern systems.
# OpenWrt handles autoreconf via its own toolchain-pinned autoconf version.
# CI skips autoreconf and uses the bundled configure directly to validate C
# compilation on modern GCC/Clang and key OpenWrt cross-compile targets.

jobs:
  build-linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
          - compiler: clang
            cc: clang
    steps:
      - uses: actions/checkout@v6

      - name: configure
        env:
          CC: ${{ matrix.cc }}
        run: |
          ./configure \
            --enable-static \
            --enable-shared \
            --disable-asm \
            CFLAGS="-std=gnu89 -Wall -Wno-unused-function"

      - name: build
        run: make -j$(nproc)

      - name: test
        run: make check || true

  build-macos:
    name: macOS (clang, x86_64)
    # macos-latest uses Apple Silicon (arm64) which the 2004 ACC layer does
    # not recognise (no __aarch64__ detection → ACC_ARCH_UNKNOWN). Use
    # macos-13 (Intel x86_64 = ACC_ARCH_AMD64) until acc_arch.h gains arm64
    # support.
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v6

      - name: configure
        run: |
          ./configure \
            --enable-static \
            --enable-shared \
            --disable-asm \
            CFLAGS="-std=gnu89 -fwrapv -Wall -Wno-unused-function"

      - name: build
        run: make -j$(sysctl -n hw.ncpu)

  build-cross-arm:
    name: Cross-compile (arm-linux-gnueabihf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross toolchain
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: configure (cross)
        run: |
          ./configure \
            --host=arm-linux-gnueabihf \
            --enable-static \
            --disable-shared \
            --disable-asm \
            CFLAGS="-std=gnu89"

      - name: build
        run: make -j$(nproc)

  build-cross-mips:
    name: Cross-compile (mipsel-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cross toolchain
        run: sudo apt-get install -y gcc-mipsel-linux-gnu

      - name: configure (cross)
        run: |
          ./configure \
            --host=mipsel-linux-gnu \
            --enable-static \
            --disable-shared \
            --disable-asm \
            CFLAGS="-std=gnu89"

      - name: build
        run: make -j$(nproc)
